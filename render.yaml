services:
  - type: web
    name: ev-charging-scheduler-api
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION, value: 3.9.0
    disk:
      name: models
      mountPath: ml_models
      sizeGB: 1
